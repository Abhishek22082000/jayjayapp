name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'jay_jay_medical/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - 'jay_jay_medical/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jay_jay_medical
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Unit tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: jay_jay_medical
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Scaffold the android/ folder on the fly so the repo stays slim.
      # `flutter create` only fills in missing platform folders; it never
      # overwrites pubspec.yaml or lib/.
      - name: Scaffold Android platform if missing
        run: |
          if [ ! -d android ]; then
            flutter create \
              --platforms=android \
              --org com.jayjaymedical \
              --project-name jay_jay_medical \
              .
          fi

      - name: Build release APK
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL="${API_BASE_URL}" \
            --dart-define=API_TOKEN="${API_TOKEN}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jayjay-medical-${{ github.sha }}-apk
          path: jay_jay_medical/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
