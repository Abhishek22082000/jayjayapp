name: jay_jay_medical
description: JJ Medical — Tablet Inventory. Track tablets purchased by clients, batches, expiry.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  http: ^1.2.1
  qr_code_scanner: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

# Run `flutter pub run flutter_launcher_icons` after dropping in a new
# assets/logo.png to regenerate launcher icons across Android densities.
# CI runs this automatically in .github/workflows/flutter.yml.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  remove_alpha_ios: false
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"
  min_sdk_android: 21
