name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'jay_jay_medical/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - 'jay_jay_medical/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jay_jay_medical
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Unit tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: jay_jay_medical
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Scaffold the android/ folder on the fly so the repo stays slim.
      # `flutter create` only fills in missing platform folders; it never
      # overwrites pubspec.yaml or lib/.
      - name: Scaffold Android platform if missing
        run: |
          if [ ! -d android ]; then
            flutter create \
              --platforms=android \
              --org com.jayjaymedical \
              --project-name jay_jay_medical \
              .
          fi

      # The release manifest produced by `flutter create` has no INTERNET
      # permission (debug builds get it via a separate debug manifest;
      # release builds don't). Without this the APK can't reach the API.
      - name: Ensure INTERNET permission in release manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MANIFEST"
            echo "Added INTERNET permission:"
            head -10 "$MANIFEST"
          else
            echo "INTERNET permission already present, leaving manifest alone."
          fi

      # mobile_scanner v5 defaults to the unbundled MLKit barcode model,
      # which Play Services downloads on first use. On devices without
      # Play Services (emulators, some OEM ROMs) or before the model has
      # finished downloading, the scanner throws a null-object reference
      # crash. Force the bundled model so the barcode classifier ships
      # inside the APK and works the moment the app launches.
      - name: Bundle MLKit barcode scanner into APK
        run: |
          GRADLE_KTS=android/app/build.gradle.kts
          GRADLE_GROOVY=android/app/build.gradle
          if [ -f "$GRADLE_KTS" ]; then
            TARGET="$GRADLE_KTS"
            DEP='implementation("com.google.mlkit:barcode-scanning:17.2.0")'
          elif [ -f "$GRADLE_GROOVY" ]; then
            TARGET="$GRADLE_GROOVY"
            DEP="implementation 'com.google.mlkit:barcode-scanning:17.2.0'"
          else
            echo "No android/app/build.gradle(.kts) found — failing"
            exit 1
          fi
          if grep -q 'mlkit:barcode-scanning' "$TARGET"; then
            echo "Bundled MLKit barcode dep already present in $TARGET"
          else
            printf '\ndependencies {\n    %s\n}\n' "$DEP" >> "$TARGET"
            echo "Appended bundled MLKit barcode dep to $TARGET:"
            tail -5 "$TARGET"
          fi

      # Generate the Android launcher icon set from assets/logo.png.
      # Skipped silently if the asset hasn't been committed yet — the
      # build then falls back to the default Flutter "F" icon.
      - name: Generate launcher icons
        run: |
          if [ -f assets/logo.png ]; then
            flutter pub run flutter_launcher_icons
          else
            echo "assets/logo.png not present yet — skipping launcher icon generation."
          fi

      - name: Build release APK
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL="${API_BASE_URL}" \
            --dart-define=API_TOKEN="${API_TOKEN}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jayjay-medical-${{ github.sha }}-apk
          path: jay_jay_medical/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
