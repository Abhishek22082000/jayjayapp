name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'jay_jay_medical/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - 'jay_jay_medical/**'
      - '.github/workflows/flutter.yml'
  workflow_dispatch:

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jay_jay_medical
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Unit tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: jay_jay_medical
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Scaffold the android/ folder on the fly so the repo stays slim.
      # `flutter create` only fills in missing platform folders; it never
      # overwrites pubspec.yaml or lib/.
      - name: Scaffold Android platform if missing
        run: |
          if [ ! -d android ]; then
            flutter create \
              --platforms=android \
              --org com.jayjaymedical \
              --project-name jay_jay_medical \
              .
          fi

      # flutter_zxing's vendored ZXing C++ uses std::char_traits<unsigned
      # char>, an extension removed from libc++ starting in NDK 27. Pin
      # to NDK 26.3 (last version with the old libc++) so the native
      # build succeeds. Flutter's default ndkVersion follows the SDK and
      # currently picks up NDK 28 on hosted runners.
      - name: Install + pin NDK 26.3 for flutter_zxing C++ build
        run: |
          set -e
          NDK_VERSION=26.3.11579264
          SDK=/usr/local/lib/android/sdk
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          if [ ! -d "$SDK/ndk/$NDK_VERSION" ]; then
            echo "Installing NDK $NDK_VERSION via sdkmanager..."
            yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" "ndk;$NDK_VERSION"
          fi
          echo "Available NDKs:"
          ls "$SDK/ndk/"

          if [ -f android/app/build.gradle.kts ]; then
            TARGET=android/app/build.gradle.kts
            KTS=1
          elif [ -f android/app/build.gradle ]; then
            TARGET=android/app/build.gradle
            KTS=0
          else
            echo "No build.gradle(.kts) found — failing"
            exit 1
          fi

          echo "=== $TARGET BEFORE PATCH ==="
          cat -n "$TARGET"

          # Replace ANY existing ndkVersion line with our pinned version.
          if [ "$KTS" = "1" ]; then
            sed -i 's|^[[:space:]]*ndkVersion.*$|    ndkVersion = "'"$NDK_VERSION"'"|' "$TARGET"
          else
            sed -i "s|^[[:space:]]*ndkVersion.*\$|    ndkVersion '$NDK_VERSION'|" "$TARGET"
          fi

          # If the scaffold didn't include an ndkVersion line at all, insert
          # one right after compileSdk (which is always present in android {}).
          if ! grep -q "$NDK_VERSION" "$TARGET"; then
            if [ "$KTS" = "1" ]; then
              sed -i 's|^\([[:space:]]*compileSdk[[:space:]]*=.*\)$|\1\n    ndkVersion = "'"$NDK_VERSION"'"|' "$TARGET"
            else
              sed -i "s|^\([[:space:]]*compileSdk[[:space:]].*\)\$|\1\n    ndkVersion '$NDK_VERSION'|" "$TARGET"
            fi
          fi

          echo "=== $TARGET AFTER PATCH ==="
          cat -n "$TARGET"

          if ! grep -q "$NDK_VERSION" "$TARGET"; then
            echo "ERROR: ndkVersion pin to $NDK_VERSION did not take effect"
            exit 1
          fi
          echo "ndkVersion successfully pinned."

      # The release manifest produced by `flutter create` has no INTERNET
      # permission (debug builds get it via a separate debug manifest;
      # release builds don't). Without this the APK can't reach the API.
      # CAMERA is needed by the flutter_zxing barcode scanner — its plugin
      # manifest also declares it, but inserting here is defensive and
      # makes the requirement obvious in the app manifest itself.
      - name: Ensure INTERNET + CAMERA permissions in release manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q 'android.permission.INTERNET' "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MANIFEST"
            echo "Added INTERNET permission."
          else
            echo "INTERNET permission already present."
          fi
          if ! grep -q 'android.permission.CAMERA' "$MANIFEST"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <application|' "$MANIFEST"
            echo "Added CAMERA permission."
          else
            echo "CAMERA permission already present."
          fi
          head -15 "$MANIFEST"

      # Generate the Android launcher icon set from assets/logo.png.
      # Skipped silently if the asset hasn't been committed yet — the
      # build then falls back to the default Flutter "F" icon.
      - name: Generate launcher icons
        run: |
          if [ -f assets/logo.png ]; then
            flutter pub run flutter_launcher_icons
          else
            echo "assets/logo.png not present yet — skipping launcher icon generation."
          fi

      - name: Build release APK
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL="${API_BASE_URL}" \
            --dart-define=API_TOKEN="${API_TOKEN}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jayjay-medical-${{ github.sha }}-apk
          path: jay_jay_medical/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
